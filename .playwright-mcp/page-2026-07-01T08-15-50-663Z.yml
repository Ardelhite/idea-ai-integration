            - generic [ref=e379]:
              - generic [ref=e380]: What’s New
              - list [ref=e385]:
                - listitem [ref=e386]: • 0.1.2 — Exec cards show the command's output below a divider; shorter tool labels (Exec / Writing); and the @-file picker now skips VCS-ignored and excluded folders (e.g. a gitignored Postgres data volume). Strip ANSI colour codes from the status line, and collect runtime errors into a collapsible "! Runtime Exception !" panel per session. Allow git writes inside .git (Codex makes it read-only in workspace-write) so commits/gh work. Settings shows Codex's full path + version with a one-click "Update codex" (greyed "Latest codex installed" when current); the gear turns yellow when an update is available; the gear reliably opens Tools → Karato.
                - listitem [ref=e387]: • 0.1.1 — Fix an IDE freeze on tool-window open (setup probe and model fetch now run off the UI thread); preserve line breaks in your prompts; and modernize APIs flagged on newer IDEs (replace the scheduled-for-removal SimpleListCellRenderer / browse-listener calls and the deprecated HTML editor kit; stop bundling the IDE's markdown library). Also allow outbound network in the workspace-write sandbox by default so gh/curl/npm work (toggle in Settings).
                - listitem [ref=e388]: "• 0.1.0 — Initial release. Multi-tab chat tool window for the Sakana AI Fugu agent (via the Codex CLI): inline tool cards, interactive approvals, GUI-only setup, Claude/Codex project-file awareness (CLAUDE.md, .claude/, memory) and MCP-server mirroring."
